<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fen Core</title>
    <style>
        /* --- VARIABLES DE COULEURS (Rouge doux et sombre) --- */
        :root {
            --bg-color: #121212;       /* Fond anthracite très sombre */
            --card-bg: #1a1a1a;        /* Fond des cases d'artworks */
            --text-color: #e0e0e0;     /* Texte blanc cassé doux */
            --accent-red: #b32424;     /* Rouge principal (bordeaux / brique) */
            --hover-red: #e63946;      /* Rouge plus vif au survol */
        }

        /* --- SENSE GLOBAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 4rem;
            border-bottom: 1px solid rgba(179, 36, 36, 0.2); /* Ligne rouge très subtile */
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .contact-link a {
            color: var(--accent-red);
            font-weight: 600;
            border-bottom: 1px solid transparent;
        }

        .contact-link a:hover {
            color: var(--hover-red);
            border-bottom: 1px solid var(--hover-red);
        }

        /* --- PORTFOLIO (GRID) --- */
        main {
            flex: 1;
            padding: 4rem;
        }

        .portfolio-grid {
            display: grid;
            /* Crée 5 colonnes égales sur grand écran */
            grid-template-columns: repeat(7, 1fr); 
            gap: 20px; /* Espace entre les cases */
            width: 100%;
        }

        .artwork-item {
            background-color: var(--card-bg);
            /* Respecte le ratio 3:4 de tes artworks (3000x4000) */
            aspect-ratio: 3 / 4; 
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        /* Effet de zoom soft au survol de la case */
        .artwork-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent-red);
        }

        .artwork-item img {
            width: 100%;
            height: 100%;
            /* Empêche l'image de se déformer si elle n'est pas au format 3:4 */
            object-fit: cover; 
            display: block;
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.85rem;
            color: #666;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* --- RESPONSIVE (Pour que ça reste beau sur mobile et tablette) --- */
        @media (max-width: 1200px) {
            .portfolio-grid { grid-template-columns: repeat(3, 1fr); } /* 3 par ligne sur tablette */
            header, main { padding: 2rem; }
        }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 1rem; text-align: center; }
            .portfolio-grid { grid-template-columns: repeat(2, 1fr); } /* 2 par ligne sur grand mobile */
        }

        @media (max-width: 480px) {
            .portfolio-grid { grid-template-columns: 1fr; } /* 1 seule colonne sur petit mobile */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Fen Core</div>
        <div class="contact-link">Contact me on <a href="https://instagram.com/fen.core" target="_blank">Instagram</a></div>
    </header>

    <main>
        <div class="portfolio-grid">
            <!-- Ligne 1 (Tes 5 premiers artworks) -->
            <div class="artwork-item"><img src="https://via.placeholder.com/300x400" alt="Artwork 1"></div>
            <div class="artwork-item"><img src="https://via.placeholder.com/300x400" alt="Artwork 2"></div>
            <div class="artwork-item"><img src="https://via.placeholder.com/300x400" alt="Artwork 3"></div>
            <div class="artwork-item"><img src="https://via.placeholder.com/300x400" alt="Artwork 4"></div>
            <div class="artwork-item"><img src="https://via.placeholder.com/300x400" alt="Artwork 5"></div>

            <!-- Répétition automatique : tu as juste à ajouter des lignes en dessous pour que ça continue à se remplir proprement par blocs de 5 -->
            <div class="artwork-item"><img src="https://via.placeholder.com/300x400" alt="Artwork 6"></div>
            <div class="artwork-item"><img src="https://via.placeholder.com/300x400" alt="Artwork 7"></div>
            <div class="artwork-item"><img src="https://via.placeholder.com/300x400" alt="Artwork 8"></div>
            <div class="artwork-item"><img src="https://via.placeholder.com/300x400" alt="Artwork 9"></div>
            <div class="artwork-item"><img src="https://via.placeholder.com/300x400" alt="Artwork 10"></div>
        </div>
    </main>

    <footer>
        <p>© Fen Core</p>
    </footer>

</body>
</html>
