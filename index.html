<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #121212;
            --text-color: #e5e5e5;
            --text-muted: #8c8c8c;
            --accent-red: #a81c1c;
            --hover-red: #e62e2e;
        }

        /* --- STYLE  --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 4rem;
            border-bottom: 1px solid rgba(168, 28, 28, 0.15); /* Ligne rouge très subtile */
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .contact-link a {
            color: var(--accent-red);
            font-weight: 500;
            border-bottom: 1px solid transparent;
            font-size: 0.95rem;
        }

        .contact-link a:hover {
            color: var(--hover-red);
            border-bottom: 1px solid var(--hover-red);
        }

        /* --- SECTION --- */
        main {
            flex: 1;
            padding: 4rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .portfolio-section {
            margin-bottom: 6rem;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            position: relative;
            padding-left: 15px;
        }

        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 3px;
            background-color: var(--accent-red);
        }

        .badge {
            background-color: rgba(168, 28, 28, 0.1);
            border: 1px solid rgba(168, 28, 28, 0.4);
            color: var(--hover-red);
            padding: 0.35rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-description {
            color: var(--text-muted);
            margin-top: -1.5rem;
            margin-bottom: 2.5rem;
            font-size: 1rem;
            font-weight: 300;
        }

        /* --- PORTFOLIO --- */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 24px;
            width: 100%;
        }

        .artwork-item {
            background-color: var(--card-bg);
            aspect-ratio: 3 / 4;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease;
        }

        .artwork-item:hover {
            transform: translateY(-8px);
            border-color: rgba(168, 28, 28, 0.6);
        }

        .artwork-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translate(-50%, 100px);
            background-color: rgba(168, 28, 28, 0.95);
            color: #ffffff;
            padding: 0.8rem 1.6rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            opacity: 0;
            z-index: 9999;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            white-space: nowrap;
        }

        .toast.show {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 3rem;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #444;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            margin-top: auto;
        }

        /* --- TEL ND CO --- */
        @media (max-width: 1400px) {
            .portfolio-grid { grid-template-columns: repeat(4, 1fr); }
        }

        @media (max-width: 1100px) {
            .portfolio-grid { grid-template-columns: repeat(3, 1fr); }
            header, main { padding: 2rem; }
        }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 1rem; text-align: center; padding: 2rem 1.5rem; }
            .portfolio-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
            .section-title { font-size: 1.8rem; }
        }

        @media (max-width: 480px) {
            .portfolio-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <!-- Message d'alerte discret de protection -->
    <div id="protection-toast" class="toast">© Artworks protégés par copyright — Fen Core</div>

    <script>
        // Bloquer le clic droit sur toute la page avec notification discrète
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            showProtectionToast();
        });

        // Double sécurité : Bloquer le drag & drop (glisser l'image vers le bureau)
        document.querySelectorAll('img').forEach(img => {
            img.addEventListener('dragstart', function(e) {
                e.preventDefault();
            });
        });

        // Fonction pour faire apparaître et disparaître la bulle d'alerte
        let toastTimeout;
        function showProtectionToast() {
            const toast = document.getElementById('protection-toast');
            toast.classList.add('show');
            
            // Réinitialise le timer si l'utilisateur reclique rapidement
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500); // Reste visible 2,5 secondes
        }
    </script>
