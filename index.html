<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fen Core</title>
    <!-- Importation d'une police ultra moderne et épurée -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- VARIABLES DE COULEURS (Rouge doux et sombre) --- */
        :root {
            --bg-color: #0a0a0a;       /* Fond encore plus sombre et moderne */
            --card-bg: #121212;        /* Fond des cases d'artworks */
            --text-color: #e5e5e5;     /* Texte blanc cassé doux */
            --text-muted: #8c8c8c;     /* Texte secondaire gris */
            --accent-red: #a81c1c;     /* Rouge principal élégant */
            --hover-red: #e62e2e;      /* Rouge plus vif au survol */
        }

        /* --- STYLE GLOBAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 4rem;
            border-bottom: 1px solid rgba(168, 28, 28, 0.15); /* Ligne rouge très subtile */
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .contact-link a {
            color: var(--accent-red);
            font-weight: 500;
            border-bottom: 1px solid transparent;
            font-size: 0.95rem;
        }

        .contact-link a:hover {
            color: var(--hover-red);
            border-bottom: 1px solid var(--hover-red);
        }

        /* --- SECTION STRUCTURE --- */
        main {
            flex: 1;
            padding: 4rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .portfolio-section {
            margin-bottom: 6rem; /* Grand espace pour faire respirer les deux projets */
        }

        /* Titres des sections */
        .section-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 300; /* Style fin et haut de gamme */
            letter-spacing: 1px;
            position: relative;
            padding-left: 15px;
        }

        /* Petite barre verticale rouge à gauche des titres */
        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 3px;
            background-color: var(--accent-red);
        }

        /* Étiquette "Projet en cours" */
        .badge {
            background-color: rgba(168, 28, 28, 0.1);
            border: 1px solid rgba(168, 28, 28, 0.4);
            color: var(--hover-red);
            padding: 0.35rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-description {
            color: var(--text-muted);
            margin-top: -1.5rem;
            margin-bottom: 2.5rem;
            font-size: 1rem;
            font-weight: 300;
        }

        /* --- PORTFOLIO (GRID) --- */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* Toujours 5 colonnes sur grand écran */
            gap: 24px;
            width: 100%;
        }

        .artwork-item {
            background-color: var(--card-bg);
            aspect-ratio: 3 / 4; /* Conserve ton format vertical 3000x4000px */
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease;
        }

        /* Effet élégant au survol */
        .artwork-item:hover {
            transform: translateY(-8px);
            border-color: rgba(168, 28, 28, 0.6);
        }

        .artwork-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Recadre l'image sans la déformer si elle n'a pas le même format */
            display: block;
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 3rem;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #444;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            margin-top: auto;
        }

        /* --- RESPONSIVE (Adaptation mobiles et tablettes) --- */
        @media (max-width: 1400px) {
            .portfolio-grid { grid-template-columns: repeat(4, 1fr); } /* 4 par ligne */
        }

        @media (max-width: 1100px) {
            .portfolio-grid { grid-template-columns: repeat(3, 1fr); } /* 3 par ligne */
            header, main { padding: 2rem; }
        }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 1rem; text-align: center; padding: 2rem 1.5rem; }
            .portfolio-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } /* 2 par ligne */
            .section-title { font-size: 1.8rem; }
        }

        @media (max-width: 480px) {
            .portfolio-grid { grid-template-columns: 1fr; } /* 1 par ligne sur tout petit écran */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Fen Core</div>
        <div class="contact-link">Contact me on <a href="https://instagram.com/TON_PSEUDO" target="_blank">Instagram</a></div>
    </header>

    <main>


        <!-- ================= SECTION 1: IN THE NAME OF ENTERTAINMENT ================= -->
        <section class="portfolio-section">
            <div class="section-header">
                <h2 class="section-title">Recent works</h2>
                <span class="badge"></span>
            </div>
            <p class="section-description">Personal projects, character designs and fanarts</p>
            
            <div class="portfolio-grid">
                <!-- Placeholders temporaires pour ton nouveau projet pendant que tu le taffes -->
                <div class="artwork-item"><img src="https://via.placeholder.com/300x400/121212/333333?text=WIP+1" alt="Project Artwork 1"></div>
                <div class="artwork-item"><img src="https://via.placeholder.com/300x400/121212/333333?text=WIP+2" alt="Project Artwork 2"></div>
                <div class="artwork-item"><img src="https://via.placeholder.com/300x400/121212/333333?text=WIP+3" alt="Project Artwork 3"></div>
                <div class="artwork-item"><img src="https://via.placeholder.com/300x400/121212/333333?text=WIP+4" alt="Project Artwork 4"></div>
                <div class="artwork-item"><img src="https://via.placeholder.com/300x400/121212/333333?text=WIP+5" alt="Project Artwork 5"></div>
            </div>
        </section>

        
        <!-- ================= SECTION 2: ENHYPEN ================= -->
        <section class="portfolio-section">
            <div class="section-header">
                <h2 class="section-title">Enhypen</h2>
            </div>
            
            <div class="portfolio-grid">
                <!-- Tu as juste à remplacer les liens de placeholders ci-dessous par tes vrais artworks Enhypen ! -->
                <div class="artwork-item"><img src="https://i.imgur.com/1ky6hzy.jpeg" alt="Enhypen Artwork 1"></div>
                <div class="artwork-item"><img src="https://via.placeholder.com/300x400/121212/a81c1c?text=Enhypen+2" alt="Enhypen Artwork 2"></div>
                <div class="artwork-item"><img src="https://via.placeholder.com/300x400/121212/a81c1c?text=Enhypen+3" alt="Enhypen Artwork 3"></div>
                <div class="artwork-item"><img src="https://via.placeholder.com/300x400/121212/a81c1c?text=Enhypen+4" alt="Enhypen Artwork 4"></div>
                <div class="artwork-item"><img src="https://via.placeholder.com/300x400/121212/a81c1c?text=Enhypen+5" alt="Enhypen Artwork 5"></div>
                
                <!-- Tu peux en rajouter autant que tu veux ici, la grille se remplira automatiquement -->
            </div>
        </section>


    </main>

    <footer>
        <p>crédits fen core</p>
    </footer>

</body>
</html>
